<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <defs>
    <!-- 党红渐变 -->
    <linearGradient id="redBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="50%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#7F0000"/>
    </linearGradient>
    <!-- 金色 -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="goldFlat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <!-- 光泽 -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="sh">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#7F0000" flood-opacity="0.4"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== 背景 ===== -->
  <circle cx="200" cy="200" r="180" fill="url(#redBg)" filter="url(#sh)"/>
  <circle cx="200" cy="200" r="173" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1.5"/>
  <ellipse cx="200" cy="110" rx="110" ry="58" fill="url(#gloss)"/>

  <!-- ===== 党徽 ===== -->
  <!-- 位于主视觉上方 -->
  <g transform="translate(200, 85)" filter="url(#gl)">
    <polygon
      points="0,-34 8,-12 31,-12 13,3 20,25 0,12 -20,25 -13,3 -31,-12 -8,-12"
      fill="url(#gold)"/>
    <!-- 五角星内部 -->
    <polygon
      points="0,-18 4,-7 15,-7 8,1 11,12 0,6 -11,12 -8,1 -15,-7 -4,-7"
      fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- ===== 手指 + 点击效果 ===== -->
  <!-- 手指从右上45度点击 -->
  <g transform="translate(200, 200)">
    <!-- 涟漪（大） -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.18"/>
    <!-- 涟漪（中） -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.28"/>
    <!-- 涟漪（小） -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>

    <!-- 手指 -->
    <g transform="translate(28, -28) rotate(-45)" filter="url(#gl)">
      <rect x="-6" y="-20" width="12" height="22" rx="6" fill="url(#goldFlat)"/>
      <path d="M-3,-15 Q0,-18 3,-15" fill="none" stroke="#C6860A" stroke-width="1" opacity="0.5"/>
      <path d="M-3,-11 Q0,-14 3,-11" fill="none" stroke="#C6860A" stroke-width="1" opacity="0.4"/>
      <path d="M-3,-7 Q0,-10 3,-7" fill="none" stroke="#C6860A" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- 点击核心 -->
    <circle cx="0" cy="0" r="10" fill="url(#gold)"/>
    <circle cx="0" cy="0" r="6.5" fill="#B71C1C"/>
    <circle cx="-1.5" cy="-1.5" r="3" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- ===== 心形（手指与党徽的交汇处） ===== -->
  <!-- 心形外发光 -->
  <path d="M200,305 C155,250 100,208 100,162 C100,128 133,105 200,143 C267,105 300,128 300,162 C300,208 245,250 200,305 Z"
        fill="#FF1744" opacity="0.2" filter="url(#gl)"/>

  <!-- 心形白色主体 -->
  <path d="M200,298 C156,244 104,204 104,161 C104,129 134,107 200,143 C266,107 296,129 296,161 C296,204 244,244 200,298 Z"
        fill="white"/>

  <!-- 心形高光 -->
  <ellipse cx="153" cy="145" rx="25" ry="17" fill="rgba(255,255,255,0.7)" transform="rotate(-30 153 145)"/>
  <ellipse cx="163" cy="154" rx="13" ry="9" fill="rgba(255,255,255,0.4)" transform="rotate(-30 163 154)"/>

  <!-- 心形底部淡红 -->
  <path d="M200,298 C156,244 104,204 104,161 C104,129 134,107 200,143 C266,107 296,129 296,161 C296,204 244,244 200,298 Z"
        fill="#FFCDD2" opacity="0.25"/>

  <!-- ===== 底部文字 ===== -->
  <!-- 金线 -->
  <line x1="120" y1="320" x2="280" y2="320" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

  <!-- 品牌名 -->
  <text x="200" y="355"
        font-family="'Noto Serif SC', serif"
        font-size="46" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="10">
    一点办
  </text>

  <!-- 英文 -->
  <text x="200" y="378"
        font-family="Arial, sans-serif"
        font-size="10" fill="rgba(255,255,255,0.5)"
        text-anchor="middle" letter-spacing="5">
    TOUCH · HEART · TRUST
  </text>

  <!-- 标语 -->
  <text x="200" y="400"
        font-family="'Noto Sans SC', sans-serif"
        font-size="9" fill="rgba(255,255,255,0.38)"
        text-anchor="middle" letter-spacing="2">
    支部引领 · 科技赋能 · 一点办成 · 服务到家
  </text>
</svg>
